<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar 2026–27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EF;--card:#fff;--text:#1A1A1A;--muted:#7A7570;--border:#E5E0D8;--accent:#8B7E66;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hero{background:#1A1A1A;color:#F7F4EF;padding:1.5rem;position:sticky;top:0;z-index:100;border-bottom:1px solid #333;}
.hero-title{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:0.25rem;}
.hero-sub{font-size:0.85rem;opacity:0.7;letter-spacing:0.05rem;text-transform:uppercase;}
.container{padding:1.25rem;max-width:600px;margin:0 auto;}
.section-title{font-family:'DM Serif Display',serif;font-size:1.4rem;margin:1.5rem 0 1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);color:var(--accent);}
.card{background:var(--card);border-radius:12px;padding:1rem;margin-bottom:0.75rem;border:1px solid var(--border);display:flex;align-items:center;gap:1rem;}
.date-box{min-width:55px;text-align:center;border-right:1px solid var(--border);padding-right:0.75rem;}
.day{display:block;font-size:1.2rem;font-weight:600;}
.month{display:block;font-size:0.7rem;text-transform:uppercase;color:var(--muted);}
.info{flex:1;}
.name{font-weight:600;display:block;margin-bottom:0.2rem;line-height:1.2;}
.meta{font-size:0.75rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;}
.tag{padding:2px 6px;border-radius:4px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.02rem;}
.office{background:#E3F2FD;color:#1976D2;}
.school{background:#FBE9E7;color:#D84315;}
.events{background:#F3E5F5;color:#7B1FA2;}
.ptm{background:#E8F5E9;color:#2E7D32;}
.exams{background:#FFF3E0;color:#E65100;}
.custom{background:#E0F7FA;color:#00838F;}
</style>
</head>
<body>

<div class="hero">
    <h1 class="hero-title">Family Calendar</h1>
    <p class="hero-sub">Academic Year 2026 – 2027</p>
</div>

<div class="container" id="calendar-content"></div>

function render() {
    const container = document.getElementById('calendar-content');
    const allEvents = [];
    Object.keys(CALENDAR_DATA).forEach(cat => {
        CALENDAR_DATA[cat].forEach(item => { allEvents.push({...item, category: cat}); });
    });
    allEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    let currentMonth = "";
    let html = "";
    allEvents.forEach(event => {
        const d = new Date(event.date);
        const monthYear = months[d.getMonth()] + " " + d.getFullYear();
        if (monthYear !== currentMonth) {
            currentMonth = monthYear;
            html += `<h2 class="section-title">${currentMonth}</h2>`;
        }
        html += `
            <div class="card">
                <div class="date-box">
                    <span class="day">${d.getDate()}</span>
                    <span class="month">${months[d.getMonth()].slice(0,3)}</span>
                </div>
                <div class="info">
                    <span class="name">${event.name}</span>
                    <div class="meta">
                        <span class="tag ${event.category}">${event.category}</span>
                        ${event.type ? `<span>• ${event.type}</span>` : ''}
                        ${event.mandatory === "true" ? `<span style="color:#d32f2f; font-weight:bold;">• Mandatory</span>` : ''}
                    </div>
                </div>
            </div>`;
    });
    container.innerHTML = html || "<p style='text-align:center; padding:2rem;'>No dates found.</p>";
}
window.onload = render;
