<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Holidays 2026–27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7570;
    --border: #E5E0D8;
    --overlap: #FFF0E8;
    --overlap-b: #FFCBA8;
    --overlap-t: #C2440E;
    --near: #FFF8E6;
    --near-b: #FFD97A;
    --near-t: #8A5C00;
    --travel: #EDFAF2;
    --travel-b: #90DDB0;
    --travel-t: #1A6B3C;
    --office: #EAF2FF;
    --office-b: #9EC5FB;
    --office-t: #0A3F8A;
    --school: #F0FAF6;
    --school-b: #7DD4B0;
    --school-t: #0A5237;
    --accent: #C2440E;
    --accent2: #1A6B3C;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .hero {
    background: #1A1A1A;
    color: #F7F4EF;
    padding: 2rem 1.25rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .hero-title em { color: #F5A26A; font-style: italic; }
  .hero-subtitle { font-size: 12px; color: #888; margin-top: 4px; font-weight: 300; }
  .next-chip {
    background: #C2440E;
    color: #fff;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .next-chip span { display: block; font-size: 10px; opacity: .75; margin-bottom: 1px; }
  .stats-row {
    display: flex;
    gap: 6px;
    margin-bottom: .85rem;
  }
  .stat {
    background: #2A2A2A;
    border-radius: 8px;
    padding: 6px 10px;
    flex: 1;
    text-align: center;
  }
  .stat-n { font-size: 18px; font-weight: 600; color: #F7F4EF; }
  .stat-l { font-size: 10px; color: #888; margin-top: 1px; }
  .stat-n.c-o { color: #F5A26A; }
  .stat-n.c-g { color: #6EDFA0; }
  .stat-n.c-y { color: #FFD97A; }
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .fbtn {
    font-size: 11px;
    padding: 5px 11px;
    border-radius: 20px;
    border: 1.5px solid;
    cursor: pointer;
    font-weight: 500;
    background: transparent;
    transition: all .15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .fbtn[data-id="all"] { border-color: #555; color: #ccc; }
  .fbtn[data-id="all"].active { background: #555; color: #fff; }
  .fbtn[data-id="overlap"] { border-color: #F5A26A; color: #F5A26A; }
  .fbtn[data-id="overlap"].active { background: #C2440E; border-color: #C2440E; color: #fff; }
  .fbtn[data-id="near"] { border-color: #FFD97A; color: #FFD97A; }
  .fbtn[data-id="near"].active { background: #8A5C00; border-color: #8A5C00; color: #fff; }
  .fbtn[data-id="travel"] { border-color: #6EDFA0; color: #6EDFA0; }
  .fbtn[data-id="travel"].active { background: #1A6B3C; border-color: #1A6B3C; color: #fff; }
  .fbtn[data-id="office"] { border-color: #9EC5FB; color: #9EC5FB; }
  .fbtn[data-id="office"].active { background: #0A3F8A; border-color: #0A3F8A; color: #fff; }
  .fbtn[data-id="school"] { border-color: #7DD4B0; color: #7DD4B0; }
  .fbtn[data-id="school"].active { background: #0A5237; border-color: #0A5237; color: #fff; }

  .content { padding: 1rem 1.25rem 3rem; max-width: 680px; margin: 0 auto; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .75rem 1rem;
    margin-bottom: 1.25rem;
  }
  .litem { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .month-group { margin-bottom: 1.75rem; }
  .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: .02em;
    margin-bottom: .6rem;
    padding-bottom: .4rem;
    border-bottom: 1px solid var(--border);
  }
  .row {
    border-radius: 10px;
    border: 1px solid;
    padding: .65rem .85rem;
    margin-bottom: 6px;
    display: grid;
    grid-template-columns: 76px 28px 1fr;
    grid-template-rows: auto auto;
    column-gap: 8px;
    row-gap: 3px;
    position: relative;
    transition: transform .1s, box-shadow .1s;
  }
  .row:active { transform: scale(.99); }
  .row.overlap { background: var(--overlap); border-color: var(--overlap-b); }
  .row.near    { background: var(--near);    border-color: var(--near-b);    }
  .row.travel  { background: var(--travel);  border-color: var(--travel-b);  }
  .row.office  { background: var(--office);  border-color: var(--office-b);  }
  .row.school  { background: var(--school);  border-color: var(--school-b);  }
  .r-date  { font-size: 12px; font-weight: 600; grid-row:1; grid-column:1; align-self: center; }
  .r-day   { font-size: 10px; color: var(--muted); grid-row:1; grid-column:2; align-self: center; }
  .r-name  { font-size: 13px; font-weight: 500; grid-row:1; grid-column:3; align-self: center; }
  .r-meta  { grid-row:2; grid-column:1 / -1; display: flex; gap: 5px; flex-wrap: wrap; padding-top: 2px; }
  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 8px;
    font-weight: 500;
  }
  .b-office { background: #DDE8FF; color: var(--office-t); }
  .b-school { background: #CCF0E0; color: var(--school-t); }
  .b-overlap { background: #FFD4B8; color: var(--overlap-t); }
  .b-near    { background: #FFE9A0; color: var(--near-t); }
  .b-travel  { background: #B6F0D0; color: var(--travel-t); }
  .b-mandatory { background: #FFE0DC; color: #8A1A0A; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 3rem 0; }
  .fade-in { animation: fi .25s ease; }
  @keyframes fi { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  @media (min-width: 480px) {
    .row { grid-template-columns: 86px 34px 1fr auto; grid-template-rows: auto; }
    .r-meta { grid-column: 4; grid-row: 1; justify-content: flex-end; align-self: center; padding-top: 0; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="hero-title">Family <em>Holidays</em><br>2026 – 27</div>
      <div class="hero-subtitle">Office + Bala Vidya Mandir (Mitula)</div>
    </div>
    <div class="next-chip" id="nextchip"><span>Next shared</span>Loading…</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n c-o" id="s-overlap">—</div><div class="stat-l">Same day</div></div>
    <div class="stat"><div class="stat-n c-y" id="s-near">—</div><div class="stat-l">Near dates</div></div>
    <div class="stat"><div class="stat-n c-g" id="s-travel">—</div><div class="stat-l">Travel opp</div></div>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="content">
  <div class="legend">
    <div class="litem"><div class="ldot" style="background:#F5A26A"></div>Both – same day</div>
    <div class="litem"><div class="ldot" style="background:#FFD97A"></div>Within 5 days</div>
    <div class="litem"><div class="ldot" style="background:#6EDFA0"></div>Travel opp (weekday)</div>
    <div class="litem"><div class="ldot" style="background:#9EC5FB"></div>Office only</div>
    <div class="litem"><div class="ldot" style="background:#7DD4B0"></div>Mitula only</div>
  </div>
  <div id="calendar"></div>
</div>

<script>
const OFFICE=[
  {date:"2026-01-01",name:"New Year",mandatory:true},
  {date:"2026-01-15",name:"Pongal"},
  {date:"2026-01-16",name:"Thiruvalluvar Day"},
  {date:"2026-01-26",name:"Republic Day",mandatory:true},
  {date:"2026-04-03",name:"Good Friday",mandatory:true},
  {date:"2026-04-14",name:"Tamil New Year",mandatory:true},
  {date:"2026-05-01",name:"May Day"},
  {date:"2026-05-27",name:"Bakrid (Eid-ul-Zuha)",mandatory:true},
  {date:"2026-08-15",name:"Independence Day"},
  {date:"2026-09-14",name:"Ganesh Chaturthi"},
  {date:"2026-10-02",name:"Gandhi Jayanti",mandatory:true},
  {date:"2026-10-20",name:"Dussehra / Vijayadashami",mandatory:true},
  {date:"2026-11-09",name:"Deepavali (Next day)",mandatory:true},
  {date:"2026-12-25",name:"Christmas",mandatory:true},
];
const SCHOOL=[
  {date:"2026-04-03",name:"Good Friday"},
  {date:"2026-04-14",name:"Tamil New Year"},
  {date:"2026-05-01",name:"May Day"},
  {date:"2026-05-28",name:"Bakrid"},
  {date:"2026-06-26",name:"Muharram"},
  {date:"2026-08-15",name:"Independence Day"},
  {date:"2026-08-21",name:"Varalakshmi Vratham"},
  {date:"2026-08-26",name:"Onam & Milad-Un-Nabi"},
  {date:"2026-08-27",name:"Avani Avittam"},
  {date:"2026-09-04",name:"Gokulashtami"},
  {date:"2026-09-14",name:"Vinayagar Chaturthi"},
  {date:"2026-10-02",name:"Gandhi Jayanthi"},
  {date:"2026-10-10",name:"Pooja Holidays Commence"},
  {date:"2026-10-19",name:"Ayudha Pooja"},
  {date:"2026-10-20",name:"Vijayadasami"},
  {date:"2026-11-07",name:"Deepavali"},
  {date:"2026-11-08",name:"Deepavali"},
  {date:"2026-11-09",name:"Deepavali"},
  {date:"2026-11-24",name:"Karthigai Deepam"},
  {date:"2026-12-25",name:"Christmas"},
  {date:"2027-01-01",name:"New Year"},
  {date:"2027-01-14",name:"Bhogi"},
  {date:"2027-01-15",name:"Pongal"},
  {date:"2027-01-16",name:"Pongal"},
  {date:"2027-01-17",name:"Pongal"},
  {date:"2027-01-26",name:"Republic Day"},
];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function td(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function fd(s){const d=td(s);return d.getDate()+" "+MS[d.getMonth()]+"'"+String(d.getFullYear()).slice(2);}
function dn(s){return DAYS[td(s).getDay()].slice(0,3);}
function iwd(s){const d=td(s).getDay();return d>0&&d<6;}
function diff(a,b){return Math.abs((td(a)-td(b))/86400000);}

function build(){
  const map={};
  OFFICE.forEach(h=>{if(!map[h.date])map[h.date]={date:h.date,office:[],school:[]};map[h.date].office.push(h);});
  SCHOOL.forEach(h=>{if(!map[h.date])map[h.date]={date:h.date,office:[],school:[]};map[h.date].school.push(h);});
  const entries=Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  const all=entries.map(e=>e.date);
  entries.forEach((e,i)=>{
    e.overlap=e.office.length>0&&e.school.length>0;
    e.near=false;
    if(!e.overlap){
      for(let j=0;j<all.length;j++){
        if(i!==j&&diff(e.date,all[j])<=5&&diff(e.date,all[j])>0){
          const ej=entries[j];
          if((e.office.length>0&&ej.school.length>0)||(e.school.length>0&&ej.office.length>0)){e.near=true;break;}
        }
      }
    }
    e.travel=e.school.length>0&&e.office.length===0&&iwd(e.date);
  });
  return entries;
}

const entries=build();
let activeFilter="all";

function rowType(e){
  if(e.overlap)return"overlap";
  if(e.near)return"near";
  if(e.travel)return"travel";
  if(e.office.length>0)return"office";
  return"school";
}

const filterDefs=[
  {id:"all",label:"All"},
  {id:"overlap",label:"Same day"},
  {id:"near",label:"Near dates"},
  {id:"travel",label:"Travel opps"},
  {id:"office",label:"Office only"},
  {id:"school",label:"Mitula only"},
];

function renderFilters(){
  const fc=document.getElementById("filters");
  fc.innerHTML="";
  filterDefs.forEach(f=>{
    const b=document.createElement("button");
    b.className="fbtn"+(activeFilter===f.id?" active":"");
    b.dataset.id=f.id;
    b.textContent=f.label;
    b.onclick=()=>{activeFilter=f.id;render();};
    fc.appendChild(b);
  });
}

function render(){
  renderFilters();
  const today=new Date();
  const stats={overlap:0,near:0,travel:0,office:0,school:0};
  entries.forEach(e=>{const t=rowType(e);if(stats[t]!==undefined)stats[t]++;});
  document.getElementById("s-total").textContent=entries.length;
  document.getElementById("s-overlap").textContent=stats.overlap;
  document.getElementById("s-near").textContent=stats.near;
  document.getElementById("s-travel").textContent=stats.travel;

  const nextOver=entries.find(e=>e.overlap&&td(e.date)>=today);
  if(nextOver){
    const nc=document.getElementById("nextchip");
    const n=[...new Set([...nextOver.office.map(x=>x.name),...nextOver.school.map(x=>x.name)])][0];
    nc.innerHTML=`<span>Next shared</span>${fd(nextOver.date)}`;
    nc.title=n;
  }

  const filtered=entries.filter(e=>{
    if(activeFilter==="all")return true;
    return rowType(e)===activeFilter;
  });

  const cal=document.getElementById("calendar");
  if(filtered.length===0){cal.innerHTML='<div class="empty">No holidays in this category.</div>';return;}

  const byMonth={};
  filtered.forEach(e=>{
    const d=td(e.date);
    const key=d.getFullYear()+"-"+d.getMonth();
    if(!byMonth[key]){byMonth[key]={label:MONTHS[d.getMonth()]+" "+d.getFullYear(),entries:[]};}
    byMonth[key].entries.push(e);
  });

  let html="";
  Object.values(byMonth).forEach(m=>{
    html+=`<div class="month-group"><div class="month-label">${m.label}</div>`;
    m.entries.forEach(e=>{
      const t=rowType(e);
      const names=[...new Set([...e.office.map(x=>x.name),...e.school.map(x=>x.name)])].join(" · ");
      let badges="";
      if(e.office.length>0)badges+=`<span class="badge b-office">Office</span>`;
      if(e.school.length>0)badges+=`<span class="badge b-school">Mitula</span>`;
      if(e.overlap)badges+=`<span class="badge b-overlap">Both</span>`;
      else if(e.near)badges+=`<span class="badge b-near">Near</span>`;
      if(e.travel)badges+=`<span class="badge b-travel">✈ Travel</span>`;
      if(e.office.some(x=>x.mandatory))badges+=`<span class="badge b-mandatory">Mandatory</span>`;
      html+=`<div class="row ${t}"><div class="r-date">${fd(e.date)}</div><div class="r-day">${dn(e.date)}</div><div class="r-name">${names}</div><div class="r-meta">${badges}</div></div>`;
    });
    html+="</div>";
  });
  cal.innerHTML=`<div class="fade-in">${html}</div>`;
}

render();
</script>
</body>
</html>
