<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar 2026–27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7570;
    --border: #E5E0D8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* HERO */
  .hero { background: #1A1A1A; color: #F7F4EF; padding: 1.25rem 1.25rem 1rem; position: sticky; top: 0; z-index: 100; }
  .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: .75rem; }
  .hero-title { font-family: 'DM Serif Display', serif; font-size: clamp(1.3rem, 5vw, 1.9rem); line-height: 1.1; letter-spacing: -0.02em; }
  .hero-title em { color: #F5A26A; font-style: italic; }
  .hero-subtitle { font-size: 11px; color: #888; margin-top: 3px; font-weight: 300; }
  .next-chip { background: #C2440E; color: #fff; font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; flex-shrink: 0; text-align:right; }
  .next-chip span { display: block; font-size: 10px; opacity: .75; margin-bottom: 1px; }
  .stats-row { display: flex; gap: 5px; margin-bottom: .75rem; flex-wrap: wrap; }
  .stat { background: #2A2A2A; border-radius: 8px; padding: 5px 8px; flex: 1; text-align: center; min-width: 55px; }
  .stat-n { font-size: 16px; font-weight: 600; color: #F7F4EF; }
  .stat-l { font-size: 9px; color: #888; margin-top: 1px; }
  .stat-n.co { color: #F5A26A; } .stat-n.cg { color: #6EDFA0; } .stat-n.cy { color: #FFD97A; } .stat-n.cp { color: #C084FC; } .stat-n.cb { color: #7DD3FC; }

  /* FILTER TABS */
  .filter-section { margin-bottom: .5rem; }
  .filter-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .fbtn { font-size: 11px; padding: 4px 10px; border-radius: 16px; border: 1.5px solid; cursor: pointer; font-weight: 500; background: transparent; transition: all .12s; font-family: inherit; white-space: nowrap; }
  /* category colors */
  .fbtn[data-c="all"]        { border-color:#555;    color:#bbb; }
  .fbtn[data-c="all"].active { background:#555; color:#fff; }
  .fbtn[data-c="overlap"]        { border-color:#F5A26A; color:#F5A26A; }
  .fbtn[data-c="overlap"].active { background:#C2440E; border-color:#C2440E; color:#fff; }
  .fbtn[data-c="near"]        { border-color:#FFD97A; color:#FFD97A; }
  .fbtn[data-c="near"].active { background:#8A5C00; border-color:#8A5C00; color:#fff; }
  .fbtn[data-c="travel"]        { border-color:#6EDFA0; color:#6EDFA0; }
  .fbtn[data-c="travel"].active { background:#1A6B3C; border-color:#1A6B3C; color:#fff; }
  .fbtn[data-c="office"]        { border-color:#9EC5FB; color:#9EC5FB; }
  .fbtn[data-c="office"].active { background:#0A3F8A; border-color:#0A3F8A; color:#fff; }
  .fbtn[data-c="school"]        { border-color:#7DD4B0; color:#7DD4B0; }
  .fbtn[data-c="school"].active { background:#0A5237; border-color:#0A5237; color:#fff; }
  .fbtn[data-c="event"]        { border-color:#C084FC; color:#C084FC; }
  .fbtn[data-c="event"].active { background:#6D28D9; border-color:#6D28D9; color:#fff; }
  .fbtn[data-c="ptm"]        { border-color:#F9A8D4; color:#F9A8D4; }
  .fbtn[data-c="ptm"].active { background:#9D174D; border-color:#9D174D; color:#fff; }
  .fbtn[data-c="bagless"]        { border-color:#FCA5A5; color:#FCA5A5; }
  .fbtn[data-c="bagless"].active { background:#991B1B; border-color:#991B1B; color:#fff; }
  .fbtn[data-c="vacation"]        { border-color:#7DD3FC; color:#7DD3FC; }
  .fbtn[data-c="vacation"].active { background:#075985; border-color:#075985; color:#fff; }

  /* CONTENT */
  .content { padding: 1rem 1.25rem 3rem; max-width: 700px; margin: 0 auto; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .65rem 1rem; margin-bottom: 1.25rem; }
  .litem { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .ldot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* MONTH */
  .month-group { margin-bottom: 1.5rem; }
  .month-label { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--muted); margin-bottom: .5rem; padding-bottom: .35rem; border-bottom: 1px solid var(--border); }

  /* ROW */
  .row { border-radius: 10px; border: 1px solid; padding: .6rem .85rem; margin-bottom: 5px; display: grid; grid-template-columns: 80px 30px 1fr; grid-template-rows: auto auto; column-gap: 8px; row-gap: 2px; transition: transform .1s; }
  .row:active { transform: scale(.99); }
  .r-date { font-size: 12px; font-weight: 600; grid-row:1; grid-column:1; align-self:center; }
  .r-day  { font-size: 10px; color: var(--muted); grid-row:1; grid-column:2; align-self:center; }
  .r-name { font-size: 13px; font-weight: 500; grid-row:1; grid-column:3; align-self:center; }
  .r-meta { grid-row:2; grid-column:1 / -1; display:flex; gap:4px; flex-wrap:wrap; padding-top:2px; }
  @media (min-width: 480px) {
    .row { grid-template-columns: 86px 32px 1fr auto; grid-template-rows: auto; }
    .r-meta { grid-column:4; grid-row:1; justify-content:flex-end; align-self:center; padding-top:0; }
  }

  /* ROW COLORS */
  .row.overlap  { background:#FFF0E8; border-color:#FFCBA8; }
  .row.near     { background:#FFF8E6; border-color:#FFD97A; }
  .row.travel   { background:#EDFAF2; border-color:#90DDB0; }
  .row.office   { background:#EAF2FF; border-color:#9EC5FB; }
  .row.school   { background:#F0FAF6; border-color:#7DD4B0; }
  .row.event    { background:#F5F3FF; border-color:#C4B5FD; }
  .row.ptm      { background:#FFF0F7; border-color:#F9A8D4; }
  .row.bagless  { background:#FFF5F5; border-color:#FCA5A5; }
  .row.vacation { background:#F0F9FF; border-color:#7DD3FC; }

  /* BADGES */
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 7px; font-weight: 500; }
  .b-office   { background:#DDE8FF; color:#0A3F8A; }
  .b-school   { background:#CCF0E0; color:#0A5237; }
  .b-both     { background:#FFD4B8; color:#C2440E; }
  .b-near     { background:#FFE9A0; color:#8A5C00; }
  .b-travel   { background:#B6F0D0; color:#1A6B3C; }
  .b-event    { background:#EDE9FE; color:#6D28D9; }
  .b-ptm      { background:#FCE7F3; color:#9D174D; }
  .b-bagless  { background:#FEE2E2; color:#991B1B; }
  .b-vacation { background:#E0F2FE; color:#075985; }
  .b-mandatory{ background:#FFE0DC; color:#8A1A0A; }

  .empty { text-align:center; color:var(--muted); font-size:14px; padding:3rem 0; }
  .fade-in { animation: fi .2s ease; }
  @keyframes fi { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────────────────
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function td(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function fd(s){const d=td(s);return d.getDate()+" "+MS[d.getMonth()]+"'"+String(d.getFullYear()).slice(2);}
function dn(s){return DAYS[td(s).getDay()].slice(0,3);}
function iwd(s){const d=td(s).getDay();return d>0&&d<6;}
function diff(a,b){return Math.abs((td(a)-td(b))/86400000);}

// ── BUILD MASTER LIST ─────────────────────────────────────────────────────────
function build(){
  const map={};

  function add(date,type,obj){
    if(!map[date])map[date]={date,office:[],school:[],events:[],ptm:[],bagless:[],vacation:[]};
    map[date][type].push(obj);
  }

  OFFICE.forEach(h=>add(h.date,"office",h));
  SCHOOL_HOL.forEach(h=>add(h.date,"school",h));
  EVENTS.forEach(e=>add(e.date,"events",e));
  PTM.forEach(p=>add(p.date,"ptm",p));
  BAGLESS.forEach(b=>add(b.date,"bagless",b));
  VACATIONS.forEach(v=>add(v.date,"vacation",v));

  const entries=Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  const allDates=entries.map(e=>e.date);

  entries.forEach((e,i)=>{
    e.hasHol = e.office.length>0||e.school.length>0;
    e.overlap = e.office.length>0&&e.school.length>0;
    e.near=false;
    if(!e.overlap&&e.hasHol){
      for(let j=0;j<allDates.length;j++){
        if(i!==j&&diff(e.date,allDates[j])<=5&&diff(e.date,allDates[j])>0){
          const ej=entries[j];
          if((e.office.length>0&&ej.school.length>0)||(e.school.length>0&&ej.office.length>0)){
            e.near=true;break;
          }
        }
      }
    }
    e.travel=e.school.length>0&&e.office.length===0&&iwd(e.date)&&!e.overlap;
  });
  return entries;
}

  {id:"event",  label:"School events"},
  {id:"ptm",    label:"PTM"},
  {id:"bagless",label:"Bagless days"},
  {id:"vacation",label:"Vacation"},
];

let activeFilter="all";

function matches(e){
  if(activeFilter==="all")return true;
  if(activeFilter==="overlap")return e.overlap;
  if(activeFilter==="near")return e.near&&!e.overlap;
  if(activeFilter==="travel")return e.travel;
  if(activeFilter==="office")return e.office.length>0&&!e.overlap&&!e.near;
  if(activeFilter==="school")return e.school.length>0&&!e.overlap&&!e.near&&!e.travel;
  if(activeFilter==="event")return e.events.length>0;
  if(activeFilter==="ptm")return e.ptm.length>0;
  if(activeFilter==="bagless")return e.bagless.length>0;
  if(activeFilter==="vacation")return e.vacation.length>0;
  return true;
}

  if(e.office.length>0)return"office";
  if(e.school.length>0)return"school";
  if(e.ptm.length>0)return"ptm";
  if(e.bagless.length>0)return"bagless";
  if(e.vacation.length>0)return"vacation";
  return"event";
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderFilters(){
  const fc=document.getElementById("filters");
  fc.innerHTML="";
  filterDefs.forEach(f=>{
    const b=document.createElement("button");
    b.className="fbtn"+(activeFilter===f.id?" active":"");
    b.dataset.c=f.id;
    b.textContent=f.label;
    b.onclick=()=>{activeFilter=f.id;render();};
    fc.appendChild(b);
  });
}

function render(){
  renderFilters();

  // stats
  let tot=entries.length,ov=0,nr=0,tr=0,ev=0,vac=0;
  entries.forEach(e=>{
    if(e.overlap)ov++;
    if(e.near&&!e.overlap)nr++;
    if(e.travel)tr++;
    if(e.events.length>0)ev++;
    if(e.vacation.length>0)vac++;
  });
  document.getElementById("s-total").textContent=tot;
  document.getElementById("s-overlap").textContent=ov;
  document.getElementById("s-near").textContent=nr;
  document.getElementById("s-travel").textContent=tr;
  document.getElementById("s-event").textContent=ev;
  document.getElementById("s-vacation").textContent=vac;

  // next shared holiday
  const today=new Date();
  const nxt=entries.find(e=>e.overlap&&td(e.date)>=today);
  if(nxt){
    const nc=document.getElementById("nextchip");
    nc.innerHTML=`<span>Next shared</span>${fd(nxt.date)}`;
  }

  const filtered=entries.filter(matches);
  const cal=document.getElementById("calendar");
  if(!filtered.length){cal.innerHTML='<div class="empty">No entries for this filter.</div>';return;}

  const byMonth={};
  filtered.forEach(e=>{
    const d=td(e.date);
    const key=d.getFullYear()+"-"+String(d.getMonth()).padStart(2,"0");
    if(!byMonth[key]){byMonth[key]={label:MONTHS[d.getMonth()]+" "+d.getFullYear(),entries:[]};}
    byMonth[key].entries.push(e);
  });

  let html="";
  Object.values(byMonth).forEach(m=>{
    html+=`<div class="month-group"><div class="month-label">${m.label}</div>`;
    m.entries.forEach(e=>{
      const rc=rowClass(e);
      // collect all names
      const allNames=[
        ...e.office.map(x=>x.name),
        ...e.school.map(x=>x.name),
        ...e.events.map(x=>x.name),
        ...e.ptm.map(x=>x.name),
        ...e.bagless.map(x=>x.name),
        ...e.vacation.map(x=>x.name),
      ];
      const uniq=[...new Set(allNames)].join(" · ");

      let badges="";
      if(e.office.length>0)badges+=`<span class="badge b-office">Office</span>`;
      if(e.school.length>0)badges+=`<span class="badge b-school">Holiday</span>`;
      if(e.overlap)badges+=`<span class="badge b-both">Both</span>`;
      else if(e.near)badges+=`<span class="badge b-near">Near</span>`;
      if(e.travel)badges+=`<span class="badge b-travel">✈ Travel</span>`;
      if(e.events.length>0)badges+=`<span class="badge b-event">Event</span>`;
      if(e.ptm.length>0)badges+=`<span class="badge b-ptm">PTM</span>`;
      if(e.bagless.length>0)badges+=`<span class="badge b-bagless">Bagless</span>`;
      if(e.vacation.length>0)badges+=`<span class="badge b-vacation">Vacation</span>`;
      if(e.office.some(x=>x.mandatory))badges+=`<span class="badge b-mandatory">Mandatory</span>`;

      html+=`<div class="row ${rc}">
        <div class="r-date">${fd(e.date)}</div>
        <div class="r-day">${dn(e.date)}</div>
        <div class="r-name">${uniq}</div>
        <div class="r-meta">${badges}</div>
      </div>`;
    });
    html+="</div>";
  });
  cal.innerHTML=`<div class="fade-in">${html}</div>`;
}

render();
</script>
</body>
</html>
